name: Sailfish OS Build & Release

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/markdownlint.yaml'
      - '.github/mlc_config.json'
      - '.github/workflows/markdownlint.yaml'

jobs:
  # ──────────────────────────────────────────────
  # Build job – runs on EVERY push (feature branches + main)
  # Uses the CODeRUS Buildfish action for Sailfish OS 5.x
  # Coderepo for target releases: https://github.com/CODeRUS/docker-sailfishos-platform-sdk
  # https://github.com/CODeRUS/github-sfos-build
  # Available SDK releases: https://hub.docker.com/r/coderus/sailfishos-platform-sdk/tags
  # ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, armv7hl, i486]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build RPM package
        uses: coderus/github-sfos-build@sfos5
        with:
          release: 5.0.0.43
          arch: ${{ matrix.arch }}

      - name: Validate build output
        run: |
          echo "Checking for RPM files..."
          ls -la RPMS/ || { echo "::error::No RPMS directory found – build may have failed"; exit 1; }
          rpm_count=$(find RPMS/ -name "*.rpm" -not -name "*-debuginfo-*" -not -name "*-debugsource-*" | wc -l)
          if [ "$rpm_count" -eq 0 ]; then
            echo "::error::No RPM files produced"
            exit 1
          fi
          echo "✅ Build successful – $rpm_count RPM package(s) produced for ${{ matrix.arch }}"
          find RPMS/ -name "*.rpm" -not -name "*-debuginfo-*" -not -name "*-debugsource-*"

      - name: Harbour compliance check
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/RPMS:/RPMS" \
            coderus/sailfishos-platform-sdk:5.0.0.43 \
            bash -c '
              set -euo pipefail

              # ── locate the real validation script ──
              VALIDATOR=""
              for path in \
                /usr/libexec/sdk-harbour-rpmvalidator/rpmvalidation.sh \
                /usr/share/sdk-harbour-rpmvalidator/rpmvalidation.sh; do
                if [ -x "$path" ]; then
                  VALIDATOR="$path"
                  echo "Found validator: $VALIDATOR"
                  break
                fi
              done

              if [ -z "$VALIDATOR" ]; then
                echo "::warning::Harbour validation script not found – falling back to basic RPM check"
              fi

              # ── run validation on each RPM ──
              failed=0
              for rpm in $(find /RPMS -name "*.rpm" \
                            -not -name "*-debuginfo-*" \
                            -not -name "*-debugsource-*"); do
                name=$(basename "$rpm")
                echo "::group::Checking $name"

                if [ -n "$VALIDATOR" ]; then
                  echo "Running: $VALIDATOR $rpm"
                  if "$VALIDATOR" "$rpm"; then
                    echo "✅ $name passed harbour validation"
                  else
                    echo "::error::$name FAILED harbour validation"
                    failed=1
                  fi
                else
                  echo "Running basic RPM metadata check..."
                  rpm -qip "$rpm"
                  rpm -qlp "$rpm"
                  echo "✅ $name basic metadata OK (full harbour check unavailable)"
                fi

                echo "::endgroup::"
              done
              exit $failed
            '

      - name: Determine artifact name
        id: artifact-name
        run: |
          VERSION=$(grep '^Version:' rpm/harbour-openhab.spec | awk '{print $2}')
          RELEASE_NUM=$(grep '^Release:' rpm/harbour-openhab.spec | awk '{print $2}')
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            SUFFIX=""
          else
            SUFFIX="-SNAPSHOT"
          fi
          NAME="harbour-openhab-${VERSION}-${RELEASE_NUM}${SUFFIX}.${{ matrix.arch }}.rpm"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "📦 Artifact name: ${NAME}"

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: |
            RPMS/*.rpm
            !RPMS/*-debuginfo-*.rpm
            !RPMS/*-debugsource-*.rpm
          retention-days: 30
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Test job – runs on feature branch pushes only (not main)
  # Add your test commands below once test infrastructure is in place.
  # ──────────────────────────────────────────────
  test:
    name: Validate package
    needs: build
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download all RPM artifacts
        uses: actions/download-artifact@v4
        with:
          path: rpms
          pattern: harbour-openhab-*
          merge-multiple: true

      - name: Verify artifacts exist for all architectures
        run: |
          echo "Downloaded RPM packages:"
          find rpms/ -name "*.rpm" -type f
          for arch in aarch64 armv7hl i486; do
            count=$(find rpms/ -name "*${arch}*.rpm" -type f | wc -l)
            if [ "$count" -eq 0 ]; then
              echo "::error::No RPM found for architecture ${arch}"
              exit 1
            fi
            echo "✅ ${arch}: ${count} package(s)"
          done

      # NOTE: Unit tests (C++ / QML) run automatically in the build job
      # via the %check section in harbour-openhab.spec.
      # This job only validates that RPM artifacts were produced for all architectures.
      # TODO: Add additional post-build checks here, for example:
      # - RPM lint checks:  rpm -qip rpms/*.rpm
      # - Install tests in emulator target

  # ──────────────────────────────────────────────
  # Release job – runs ONLY on push to main (i.e., merged Pull Requests)
  # ──────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract version from spec file
        id: version
        run: |
          VERSION=$(grep '^Version:' rpm/harbour-openhab.spec | awk '{print $2}')
          RELEASE_NUM=$(grep '^Release:' rpm/harbour-openhab.spec | awk '{print $2}')
          TAG="v${VERSION}-${RELEASE_NUM}-release"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release=${RELEASE_NUM}" >> "$GITHUB_OUTPUT"
          echo "📦 Release version: ${TAG}"

      - name: Check for duplicate release tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "Checking if release tag '${TAG}' already exists..."
          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "::error::❌ Release '${TAG}' already exists! Please adjust VERSION and/or RELEASE in file: rpm/harbour-openhab.spec (Current: Version=${{ steps.version.outputs.version }}, Release=${{ steps.version.outputs.release }})."
            exit 1
          fi
          echo "✅ Tag '${TAG}' not used yet – Release can be created."

      - name: Download all RPM artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-rpms
          pattern: harbour-openhab-*
          merge-multiple: true

      - name: List release artifacts
        run: |
          echo "Release artifacts:"
          find release-rpms/ -name "*.rpm" -type f -exec ls -lh {} \;

      # pinning to SHA to mitigate possible supply chain attack
      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe4860a8b36aef4e9e74bcb092bf597ec500b # v2.2.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## openHAB Sailfish OS Client ${{ steps.version.outputs.name }}

            ### 📱 Packages

            | Architecture | Description |
            |---|---|
            | **aarch64** | 64-bit ARM devices (e.g. Sony Xperia 10 III+) |
            | **armv7hl** | 32-bit ARM devices (e.g. Sony Xperia 10) |
            | **i486** | Emulator / x86 devices |

            ### 📋 Changelog

            See [harbour-openhab.changes](https://github.com/${{ github.repository }}/blob/main/rpm/harbour-openhab.changes) for details.
          files: release-rpms/**/*.rpm
          fail_on_unmatched_files: true
          draft: false
          prerelease: false

