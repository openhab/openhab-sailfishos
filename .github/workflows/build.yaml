name: Build App

on:
  push:
    branches-ignore:
      - 'main'
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/markdownlint.yaml'
      - '.github/mlc_config.json'
      - '.github/workflows/markdownlint.yaml'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/markdownlint.yaml'
      - '.github/mlc_config.json'
      - '.github/workflows/markdownlint.yaml'
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Build job – CI only, runs on feature branch pushes and PRs
  # Never runs on direct pushes to main (releases are handled by release.yaml)
  # Uses the CODeRUS Buildfish action for Sailfish OS 5.x
  # Coderepo for target releases: https://github.com/CODeRUS/docker-sailfishos-platform-sdk
  # https://github.com/CODeRUS/github-sfos-build
  # Available SDK releases: https://hub.docker.com/r/coderus/sailfishos-platform-sdk/tags
  # ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.arch }})
    # Avoid duplicate builds: on pull_request, only run for forks (push already covers internal branches)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, armv7hl, i486]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build RPM package
        uses: coderus/github-sfos-build@sfos5
        with:
          release: 5.0.0.43
          arch: ${{ matrix.arch }}

      - name: Validate build output
        run: |
          echo "Checking for RPM files..."
          ls -la RPMS/ || { echo "::error::No RPMS directory found – build may have failed"; exit 1; }
          rpm_count=$(find RPMS/ -name "*.rpm" -not -name "*-debuginfo-*" -not -name "*-debugsource-*" | wc -l)
          if [ "$rpm_count" -eq 0 ]; then
            echo "::error::No RPM files produced"
            exit 1
          fi
          echo "✅ Build successful – $rpm_count RPM package(s) produced for ${{ matrix.arch }}"
          find RPMS/ -name "*.rpm" -not -name "*-debuginfo-*" -not -name "*-debugsource-*"

      - name: Harbour compliance check
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/RPMS:/RPMS" \
            coderus/sailfishos-platform-sdk:5.0.0.43 \
            bash -c '
              set -euo pipefail

              # ── locate the real validation script ──
              VALIDATOR=""
              for path in \
                /usr/libexec/sdk-harbour-rpmvalidator/rpmvalidation.sh \
                /usr/share/sdk-harbour-rpmvalidator/rpmvalidation.sh; do
                if [ -x "$path" ]; then
                  VALIDATOR="$path"
                  echo "Found validator: $VALIDATOR"
                  break
                fi
              done

              if [ -z "$VALIDATOR" ]; then
                echo "::warning::Harbour validation script not found – falling back to basic RPM check"
              fi

              # ── run validation on each RPM ──
              failed=0
              for rpm in $(find /RPMS -name "*.rpm" \
                            -not -name "*-debuginfo-*" \
                            -not -name "*-debugsource-*"); do
                name=$(basename "$rpm")
                echo "::group::Checking $name"

                if [ -n "$VALIDATOR" ]; then
                  echo "Running: $VALIDATOR $rpm"
                  if "$VALIDATOR" "$rpm"; then
                    echo "✅ $name passed harbour validation"
                  else
                    echo "::error::$name FAILED harbour validation"
                    failed=1
                  fi
                else
                  echo "Running basic RPM metadata check..."
                  rpm -qip "$rpm"
                  rpm -qlp "$rpm"
                  echo "✅ $name basic metadata OK (full harbour check unavailable)"
                fi

                echo "::endgroup::"
              done
              exit $failed
            '

      - name: Determine artifact name
        id: artifact-name
        run: |
          VERSION=$(grep '^Version:' rpm/harbour-openhab.spec | awk '{print $2}')
          RELEASE_NUM=$(grep '^Release:' rpm/harbour-openhab.spec | awk '{print $2}')
          NAME="harbour-openhab-${VERSION}-${RELEASE_NUM}-SNAPSHOT.${{ matrix.arch }}.rpm"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "📦 Artifact name: ${NAME}"

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: |
            RPMS/*.rpm
            !RPMS/*-debuginfo-*.rpm
            !RPMS/*-debugsource-*.rpm
          retention-days: 30
          if-no-files-found: error